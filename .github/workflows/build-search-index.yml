name: Build Search Index

# When this runs:
#   1. On a schedule (every 4 hours) — keeps the index fresh automatically
#   2. On push to main — useful if you tweak the scraper itself
#   3. Manually from the Actions tab — for when you publish content and
#      don't want to wait for the next scheduled run
on:
  schedule:
    - cron: "0 */4 * * *"
  push:
    branches: [main]
    paths:
      - "build-search-index.js"
      - "package.json"
      - ".github/workflows/build-search-index.yml"
  workflow_dispatch:

# Needs write access so the workflow can commit the updated JSON back.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build search index
        run: npm run build

      - name: Commit updated index if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add search-index.json
          if git diff --staged --quiet; then
            echo "No changes to search-index.json — skipping commit"
          else
            git commit -m "chore: update search index [skip ci]"
            git push
          fi
